name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to trigger the build manually

# Permissions required for modern native deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevents multiple deployments from running at the same time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install deps
        run: npm ci

      - name: Build
        env:
          REPO_NAME: "${{ github.repository }}"
        run: |
          REPO=${REPO_NAME#*/}
          echo "Building with base=/$REPO/"
          npm run build -- --base=/$REPO/

      - name: SPA fallback (client)
        run: |
          cp dist/client/index.html dist/client/404.html || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the specific output directory
          path: './dist/client'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
