name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]

# Ensure the workflow has permission to push the `gh-pages` branch
permissions:
  contents: write
  pages: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Build
        env:
          REPO_NAME: "${{ github.repository }}"
        run: |
          # compute repo name (owner/repo -> repo)
          REPO=${REPO_NAME#*/}
          echo "Building with base=/$REPO/"
          npm run build -- --base=/$REPO/

      - name: SPA fallback (client)
        run: |
          cp dist/client/index.html dist/client/404.html || true

      - name: Deploy to gh-pages (publish client)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/client
